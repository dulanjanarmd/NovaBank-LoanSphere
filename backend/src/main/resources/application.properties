# ====================================================================
# NOVABANK LOANSPHERE APPLICATION CONFIGURATIONS
# ====================================================================

# Port definition
server.port=8080

# H2 Database for testing (temporary)
spring.datasource.url=jdbc:h2:mem:novabank_loansphere;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# JPA / Hibernate Configurations
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.open-in-view=false

# JWT Secret Properties
jwt.secret=6a715f57393430343536373839306162636465666768696a6b6c6d6e6f707172
jwt.expiration=900000
jwt.refreshExpiration=604800000

# File Upload configurations
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# OpenAPI/Swagger paths
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
